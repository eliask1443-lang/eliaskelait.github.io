<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mon CV</title>
  <style>
    body { font-family: system-ui, Arial; margin: 0; background:#0b1020; color:#e8eefc; }
    header { padding: 48px 20px; text-align: center; border-bottom: 1px solid #22305f; }
    .container { max-width: 900px; margin: 0 auto; padding: 24px 20px; }
    .card { background:#111a33; border:1px solid #24335f; border-radius: 12px; padding: 18px; }
    a.btn { display:inline-block; margin-top:12px; padding:12px 16px; background:#3b82f6; color:white; text-decoration:none; border-radius:10px; }
    .muted { opacity:0.8; }
  </style>
</head>
<body>
  <header>
    <h1>Mon Portfolio & CV</h1>
    <p class="muted">Technicien IT</p>
  </header>

  <div class="container">
    <div class="card">
      <h2>CV</h2>
      <p>Télécharger mon CV:</p>
      <!-- On mettra cv.pdf ici juste après -->
      <a class="btn" href="cv.pdf" target="_blank">Voir mon CV (PDF)</a>
    </div>
  </div>
</body>
</html>
